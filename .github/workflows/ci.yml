name: CI


on:
  pull_request:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - run: bun run check
      - run: bun run build
      - run: bun run test
      - run: bun run lint:ci
